name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  API_IMAGE: ${{ github.repository }}
  BATCH_IMAGE: ${{ github.repository_owner }}/ossref-batch

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew build --no-daemon

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set short SHA
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.API_IMAGE }}:${{ steps.sha.outputs.short }}
            ${{ env.REGISTRY }}/${{ env.API_IMAGE }}:latest

      - name: Build and push Batch image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile-batch
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.BATCH_IMAGE }}:${{ steps.sha.outputs.short }}
            ${{ env.REGISTRY }}/${{ env.BATCH_IMAGE }}:latest

  update-manifest:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Set short SHA
        id: sha
        run: echo "short=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Checkout k8s-manifests
        uses: actions/checkout@v4
        with:
          repository: ghghtygh/k8s-manifests
          token: ${{ secrets.K8S_MANIFESTS_PAT }}

      - name: Update deployment image tags
        run: |
          SHORT_SHA=${{ steps.sha.outputs.short }}
          sed -i "s|image: ghcr.io/ghghtygh/ossref-api:.*|image: ghcr.io/ghghtygh/ossref-api:${SHORT_SHA}|" apps/ossref-api/deployment.yaml
          sed -i "s|image: ghcr.io/ghghtygh/ossref-batch:.*|image: ghcr.io/ghghtygh/ossref-batch:${SHORT_SHA}|" apps/ossref-batch/cronjob.yaml

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff --cached --quiet; then
            echo "No manifest changes"
          else
            git commit -m "chore: update ossref images to ${{ steps.sha.outputs.short }}"
            git push
          fi
